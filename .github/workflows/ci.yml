name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run lint
      - name: Build app
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_ENV: "prod"
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: "ci-secret-key-for-checks-only"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "False"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:3000"
      DJANGO_SECURE_SSL_REDIRECT: "True"
      DJANGO_SESSION_COOKIE_SECURE: "True"
      DJANGO_CSRF_COOKIE_SECURE: "True"
      DJANGO_SECURE_HSTS_SECONDS: "31536000"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      DJANGO_SECURE_HSTS_PRELOAD: "True"
      DJANGO_ALLOW_LEGACY_PREPARED_CONTENT_API: "False"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Django deploy check
        run: python manage.py check --deploy
      - name: Run migrations
        env:
          DJANGO_SECURE_SSL_REDIRECT: "False"
          DJANGO_SESSION_COOKIE_SECURE: "False"
          DJANGO_CSRF_COOKIE_SECURE: "False"
          DJANGO_SECURE_HSTS_SECONDS: "0"
          DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "False"
          DJANGO_SECURE_HSTS_PRELOAD: "False"
        run: python manage.py migrate --noinput
      - name: Run tests
        env:
          DJANGO_SECURE_SSL_REDIRECT: "False"
          DJANGO_SESSION_COOKIE_SECURE: "False"
          DJANGO_CSRF_COOKIE_SECURE: "False"
          DJANGO_SECURE_HSTS_SECONDS: "0"
          DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "False"
          DJANGO_SECURE_HSTS_PRELOAD: "False"
        run: python manage.py test

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    env:
      DJANGO_SECRET_KEY: "ci-docker-secret-key-with-long-random-value-123456789"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose -f docker-compose.prod.yml config
      - name: Build images
        run: docker compose -f docker-compose.prod.yml build
      - name: Start stack
        run: docker compose -f docker-compose.prod.yml up -d
      - name: Wait for services and smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:3000/api/health/ > /dev/null; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 3
          done
          echo "Smoke test failed"
          docker compose -f docker-compose.prod.yml ps
          exit 1
      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
